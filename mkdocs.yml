site_name: GenAI on EKS Starter Kit
site_url: https://aws-samples.github.io/sample-genai-on-eks-starter-kit/
site_description: A starter kit for deploying and managing GenAI components on Amazon EKS
repo_url: https://github.com/aws-samples/sample-genai-on-eks-starter-kit
repo_name: aws-samples/sample-genai-on-eks-starter-kit
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aws-samples/sample-genai-on-eks-starter-kit

nav:
  - Home: index.md
  - Flexible AI:
    - Landing: flexible-ai/landing.html
    - Landing (한국어): flexible-ai/landing.ko.html
    - Docs (English):
      - Overview: flexible-ai/index.md
      - Why Flexible AI: flexible-ai/why.md
      - Architecture: flexible-ai/architecture.md
      - Use Cases: flexible-ai/use-cases.md
      - Get Started: flexible-ai/get-started.md
    - Docs (한국어):
      - 개요: flexible-ai/index.ko.md
      - Why Flexible AI: flexible-ai/why.ko.md
      - 아키텍처: flexible-ai/architecture.ko.md
      - 활용 사례: flexible-ai/use-cases.ko.md
      - 시작하기: flexible-ai/get-started.ko.md
  - Getting Started: getting-started/quick-start.md
  - Reference:
    - CLI Commands: reference/cli-commands.md
    - Configuration: reference/configuration.md
