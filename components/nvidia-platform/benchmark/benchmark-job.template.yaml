# ==============================================================================
# AIPerf Benchmark Job
# Benchmark: {{{BENCHMARK_NAME}}} (mode: {{{BENCHMARK_MODE}}})
# Target: {{{ENDPOINT_URL}}}
# Generated by: ./cli nvidia-platform benchmark install
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-{{{BENCHMARK_NAME}}}-{{{JOB_SUFFIX}}}
  labels:
    app: dynamo-benchmark
    benchmark-name: "{{{BENCHMARK_NAME}}}"
spec:
  template:
    spec:
      containers:
      - name: benchmark-runner
        image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
        env:
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token-secret
                key: HF_TOKEN
                optional: true
          - name: TERM
            value: "dumb"
          - name: NO_COLOR
            value: "1"
          - name: TQDM_DISABLE
            value: "1"
{{#if IS_PREFIX_CACHE}}
        command: ["aiperf", "profile"]
        args:
          - -m
          - "{{{MODEL}}}"
          - --endpoint-type
          - chat
          - --streaming
          - -u
          - "{{{ENDPOINT_URL}}}"
          - --tokenizer
          - "{{{MODEL}}}"
          - --artifact-dir
          - /data/results/{{{BENCHMARK_NAME}}}/c{{{CONCURRENCY}}}
          - --concurrency
          - "{{{CONCURRENCY}}}"
          - --synthetic-input-tokens-mean
          - "{{{ISL}}}"
          - --output-tokens-mean
          - "{{{OSL}}}"
          - --prefix-prompt-length
          - "{{{PREFIX_LENGTH}}}"
          - --prefix-prompt-pool-size
          - "{{{PREFIX_POOL_SIZE}}}"
          - --request-count
          - "{{{REQUEST_COUNT}}}"
          - --extra-inputs
          - "max_tokens:{{{OSL}}}"
{{else}}
        command: ["aiperf", "profile"]
        args:
          - -m
          - "{{{MODEL}}}"
          - --endpoint-type
          - chat
          - --streaming
          - -u
          - "{{{ENDPOINT_URL}}}"
          - --tokenizer
          - "{{{MODEL}}}"
          - --artifact-dir
          - /data/results/{{{BENCHMARK_NAME}}}/c{{{CONCURRENCY}}}
{{#if IS_SWEEP}}
          - --concurrency
          - "{{{CONCURRENCY}}}"
          - --synthetic-input-tokens-mean
          - "{{{ISL}}}"
          - --synthetic-input-tokens-stddev
          - "{{{STD}}}"
          - --output-tokens-mean
          - "{{{OSL}}}"
          - --extra-inputs
          - "max_tokens:{{{OSL}}}"
          - --extra-inputs
          - "min_tokens:{{{OSL}}}"
          - --extra-inputs
          - "ignore_eos:true"
{{/if}}
{{#if IS_MULTI_TURN}}
          - --conversation-turn-mean
          - "{{{TURN_MEAN}}}"
          - --conversation-turn-stddev
          - "{{{TURN_STDDEV}}}"
          - --num-sessions
          - "{{{NUM_SESSIONS}}}"
          - --concurrency
          - "{{{CONCURRENCY}}}"
          - --synthetic-input-tokens-mean
          - "{{{ISL}}}"
          - --output-tokens-mean
          - "{{{OSL}}}"
          - --extra-inputs
          - "max_tokens:{{{OSL}}}"
{{/if}}
{{#if IS_SEQ_DIST}}
          - --sequence-distribution
          - "{{{SEQUENCE_DISTRIBUTION}}}"
          - --concurrency
          - "{{{CONCURRENCY}}}"
          - --extra-inputs
          - "ignore_eos:true"
{{/if}}
{{/if}}
        volumeMounts:
          - name: results
            mountPath: /data
      restartPolicy: Never
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: benchmark-results
{{#if IS_K8S}}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
{{/if}}
{{#if IS_EKS}}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: eks.amazonaws.com/compute-type
          operator: Equal
          value: auto
          effect: NoSchedule
{{/if}}
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
