# ==============================================================================
# Dynamo vLLM Deployment - Generated Template
# Model: {{{MODEL}}}
# Mode: {{{DEPLOYMENT_MODE}}}
# Generated by: ./cli nvidia-platform dynamo-vllm install
# ==============================================================================
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: {{{DEPLOYMENT_NAME}}}
spec:
  # Global environment variables
  envs:
    - name: DYN_LOG
      value: "info"
{{#if ENABLE_MODEL_CACHE}}
  
  # Persistent volume for model cache
  pvcs:
    - name: {{{MODEL_CACHE_PVC_NAME}}}
      create: false
{{/if}}
  
  services:
    # =========================================================================
    # Frontend: OpenAI-compatible API server
    # =========================================================================
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
{{#if ENABLE_KV_ROUTER}}
      envs:
        - name: DYN_ROUTER_MODE
          value: kv
        - name: DYN_ROUTER_TEMPERATURE
          value: "{{{ROUTER_TEMPERATURE}}}"
        - name: DYN_KV_OVERLAP_SCORE_WEIGHT
          value: "{{{OVERLAP_SCORE_WEIGHT}}}"
{{/if}}
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
{{#if ENABLE_MODEL_CACHE}}
          env:
            - name: HF_HOME
              value: /opt/models
{{/if}}
{{#if IS_EKS}}
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
{{#if IS_AGG}}
    
    # =========================================================================
    # VllmWorker: Aggregated mode - single worker for prefill + decode
    # =========================================================================
    VllmWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: {{{AGG_REPLICAS}}}
{{#if ENABLE_KVBM}}
      resources:
        requests:
          cpu: "8"
          memory: "200Gi"
        limits:
          cpu: "16"
          memory: "250Gi"
          gpu: "{{{GPU_COUNT}}}"
      envs:
        - name: DYN_KVBM_CPU_CACHE_GB
          value: "{{{KVBM_CPU_CACHE_GB}}}"
{{#if ENABLE_KVBM_DISK}}
        - name: DYN_KVBM_DISK_CACHE_GB
          value: "{{{KVBM_DISK_CACHE_GB}}}"
{{/if}}
{{else}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "64Gi"
          gpu: "{{{GPU_COUNT}}}"
{{/if}}
      sharedMemory:
        size: 20Gi
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: SERVED_MODEL_NAME
              value: "{{{SERVED_MODEL_NAME}}}"
{{#if ENABLE_MODEL_CACHE}}
            - name: HF_HOME
              value: /opt/models
{{/if}}
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - "{{{MODEL}}}"
            - --served-model-name
            - "{{{SERVED_MODEL_NAME}}}"
            - --tensor-parallel-size
            - "{{{TENSOR_PARALLEL}}}"
{{#if ENABLE_PP}}
            - --pipeline-parallel-size
            - "{{{PIPELINE_PARALLEL}}}"
{{/if}}
{{#if ENABLE_DP}}
            - --data-parallel-size
            - "{{{DATA_PARALLEL}}}"
{{/if}}
{{#if ENABLE_KVBM}}
            - --enforce-eager
            - --connector
            - kvbm
{{/if}}
{{#if ENABLE_KV_ROUTER}}
            - --kv-events-config
            - '{"enable_kv_cache_events": true}'
{{/if}}
{{{ADDITIONAL_ARGS_YAML}}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
{{#if EKS_INSTANCE_FAMILY}}
          node.kubernetes.io/instance-family: "{{{EKS_INSTANCE_FAMILY}}}"
{{/if}}
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{#if IS_EKS}}
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
{{/if}}
{{#if IS_DISAGG}}
    
    # =========================================================================
    # VllmDecodeWorker: Disaggregated mode - decode-only worker
    # =========================================================================
    VllmDecodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: decode
      replicas: {{{DECODE_REPLICAS}}}
{{#if ENABLE_KVBM}}
      resources:
        requests:
          cpu: "8"
          memory: "200Gi"
        limits:
          cpu: "16"
          memory: "250Gi"
          gpu: "{{{GPU_COUNT}}}"
      envs:
        - name: DYN_KVBM_CPU_CACHE_GB
          value: "{{{KVBM_CPU_CACHE_GB}}}"
{{#if ENABLE_KVBM_DISK}}
        - name: DYN_KVBM_DISK_CACHE_GB
          value: "{{{KVBM_DISK_CACHE_GB}}}"
{{/if}}
{{else}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "64Gi"
          gpu: "{{{GPU_COUNT}}}"
{{/if}}
      sharedMemory:
        size: 20Gi
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: SERVED_MODEL_NAME
              value: "{{{SERVED_MODEL_NAME}}}"
{{#if ENABLE_MODEL_CACHE}}
            - name: HF_HOME
              value: /opt/models
{{/if}}
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - "{{{MODEL}}}"
            - --served-model-name
            - "{{{SERVED_MODEL_NAME}}}"
            - --tensor-parallel-size
            - "{{{TENSOR_PARALLEL}}}"
{{#if ENABLE_PP}}
            - --pipeline-parallel-size
            - "{{{PIPELINE_PARALLEL}}}"
{{/if}}
            - --is-decode-worker
{{#if ENABLE_KVBM}}
            - --enforce-eager
            - --connector
            - kvbm
{{/if}}
{{#if ENABLE_KV_ROUTER}}
            - --kv-events-config
            - '{"enable_kv_cache_events": true}'
{{/if}}
{{{ADDITIONAL_ARGS_YAML}}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
{{#if EKS_INSTANCE_FAMILY}}
          node.kubernetes.io/instance-family: "{{{EKS_INSTANCE_FAMILY}}}"
{{/if}}
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{#if IS_EKS}}
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
    
    # =========================================================================
    # VllmPrefillWorker: Disaggregated mode - prefill-only worker
    # =========================================================================
    VllmPrefillWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: prefill
      replicas: {{{PREFILL_REPLICAS}}}
{{#if ENABLE_KVBM}}
      resources:
        requests:
          cpu: "8"
          memory: "200Gi"
        limits:
          cpu: "16"
          memory: "250Gi"
          gpu: "{{{GPU_COUNT}}}"
      envs:
        - name: DYN_KVBM_CPU_CACHE_GB
          value: "{{{KVBM_CPU_CACHE_GB}}}"
{{#if ENABLE_KVBM_DISK}}
        - name: DYN_KVBM_DISK_CACHE_GB
          value: "{{{KVBM_DISK_CACHE_GB}}}"
{{/if}}
{{else}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "64Gi"
          gpu: "{{{GPU_COUNT}}}"
{{/if}}
      sharedMemory:
        size: 20Gi
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: SERVED_MODEL_NAME
              value: "{{{SERVED_MODEL_NAME}}}"
{{#if ENABLE_MODEL_CACHE}}
            - name: HF_HOME
              value: /opt/models
{{/if}}
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - "{{{MODEL}}}"
            - --served-model-name
            - "{{{SERVED_MODEL_NAME}}}"
            - --tensor-parallel-size
            - "{{{TENSOR_PARALLEL}}}"
{{#if ENABLE_PP}}
            - --pipeline-parallel-size
            - "{{{PIPELINE_PARALLEL}}}"
{{/if}}
            - --is-prefill-worker
{{#if ENABLE_KVBM}}
            - --enforce-eager
            - --connector
            - kvbm
{{/if}}
{{{ADDITIONAL_ARGS_YAML}}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
{{#if EKS_INSTANCE_FAMILY}}
          node.kubernetes.io/instance-family: "{{{EKS_INSTANCE_FAMILY}}}"
{{/if}}
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{#if IS_EKS}}
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
{{/if}}
