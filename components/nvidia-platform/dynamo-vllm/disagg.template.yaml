# ==============================================================================
# Dynamo vLLM Disaggregated Deployment
# - Separate prefill and decode workers
# - Better throughput and resource utilization for larger models
# - Uses NIXL for efficient KV cache transfer between workers
# ==============================================================================
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: {{{DEPLOYMENT_NAME}}}
spec:
  # Environment variables for all services
  envs:
    - name: DYN_LOG
      value: "info"
  
  services:
    # Frontend: OpenAI-compatible API server
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
{{#if IS_EKS}}
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
    
    # VllmDecodeWorker: Specialized for decode-only operations
    VllmDecodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: decode
      replicas: {{{DECODE_REPLICAS}}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "32Gi"
          nvidia.com/gpu: "{{{GPU_COUNT}}}"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - "{{{MODEL}}}"
            - --is-decode-worker
{{#if IS_EKS}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{else}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{/if}}
    
    # VllmPrefillWorker: Specialized for prefill-only operations
    VllmPrefillWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: prefill
      replicas: {{{PREFILL_REPLICAS}}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "32Gi"
          nvidia.com/gpu: "{{{GPU_COUNT}}}"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - "{{{MODEL}}}"
            - --is-prefill-worker
{{#if IS_EKS}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{else}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{/if}}
