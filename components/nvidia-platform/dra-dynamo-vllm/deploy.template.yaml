# ==============================================================================
# Dynamo vLLM Deployment with DRA (Dynamic Resource Allocation)
# Model: {{{MODEL}}} → local path: {{{MODEL_LOCAL_PATH}}}
# Mode: {{{DEPLOYMENT_MODE}}}
# DRA DeviceClass: {{{DEVICE_CLASS_NAME}}}
# Generated by: ./cli nvidia-platform dra-dynamo-vllm install
# ==============================================================================
---
# ResourceClaimTemplate for GPU allocation via DRA
apiVersion: resource.k8s.io/v1beta1
kind: ResourceClaimTemplate
metadata:
  name: {{{DEPLOYMENT_NAME}}}-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          deviceClassName: "{{{DEVICE_CLASS_NAME}}}"
          count: {{{GPU_COUNT}}}
{{#if IS_DISAGG}}
---
apiVersion: resource.k8s.io/v1beta1
kind: ResourceClaimTemplate
metadata:
  name: {{{DEPLOYMENT_NAME}}}-gpu-prefill
spec:
  spec:
    devices:
      requests:
        - name: gpu
          deviceClassName: "{{{DEVICE_CLASS_NAME}}}"
          count: {{{PREFILL_GPU_COUNT}}}
---
apiVersion: resource.k8s.io/v1beta1
kind: ResourceClaimTemplate
metadata:
  name: {{{DEPLOYMENT_NAME}}}-gpu-decode
spec:
  spec:
    devices:
      requests:
        - name: gpu
          deviceClassName: "{{{DEVICE_CLASS_NAME}}}"
          count: {{{DECODE_GPU_COUNT}}}
{{/if}}
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: {{{DEPLOYMENT_NAME}}}
spec:
  envs:
    - name: DYN_LOG
      value: "info"
{{#if ENABLE_STRUCTURED_LOGGING}}
    - name: DYN_LOGGING_JSONL
      value: "true"
{{/if}}
{{#if ENABLE_MODEL_CACHE}}
  pvcs:
    - name: {{{MODEL_CACHE_PVC_NAME}}}
      create: false
{{/if}}
  
  services:
    # =========================================================================
    # Frontend: OpenAI-compatible API server
    # =========================================================================
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
{{#if ENABLE_KV_ROUTER}}
      envs:
        - name: DYN_ROUTER_MODE
          value: kv
        - name: DYN_ROUTER_TEMPERATURE
          value: "{{{ROUTER_TEMPERATURE}}}"
        - name: DYN_KV_OVERLAP_SCORE_WEIGHT
          value: "{{{OVERLAP_SCORE_WEIGHT}}}"
{{/if}}
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
{{#if ENABLE_MODEL_CACHE}}
          env:
            - name: HF_HOME
              value: /opt/models
{{/if}}
{{#if IS_EKS}}
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
{{#if IS_AGG}}
    
    # =========================================================================
    # VllmWorker: Aggregated mode - DRA GPU allocation
    # =========================================================================
    VllmWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: {{{AGG_REPLICAS}}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "64Gi"
        claims:
          - name: gpu
            resourceClaimTemplateName: {{{DEPLOYMENT_NAME}}}-gpu
      sharedMemory:
        size: 20Gi
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: SERVED_MODEL_NAME
              value: "{{{SERVED_MODEL_NAME}}}"
            - name: MODEL_PATH
              value: "{{{MODEL_LOCAL_PATH}}}"
{{#if ENABLE_MODEL_CACHE}}
            - name: HF_HOME
              value: /opt/models
{{/if}}
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.vllm
              --model $MODEL_PATH
              --served-model-name $SERVED_MODEL_NAME
              --tensor-parallel-size {{{TENSOR_PARALLEL}}}
{{#if ENABLE_PP}}
              --pipeline-parallel-size {{{PIPELINE_PARALLEL}}}
{{/if}}
{{#if ENABLE_EP}}
              --enable-expert-parallel
{{/if}}
{{#if ENABLE_KV_ROUTER}}
              --kv-events-config '{"enable_kv_cache_events": true}'
{{/if}}
              {{{ADDITIONAL_ARGS_INLINE}}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{#if IS_EKS}}
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
{{/if}}
{{#if IS_DISAGG}}
    
    # =========================================================================
    # VllmDecodeWorker: Disaggregated mode - DRA GPU allocation
    # =========================================================================
    VllmDecodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: decode
      replicas: {{{DECODE_REPLICAS}}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "64Gi"
        claims:
          - name: gpu
            resourceClaimTemplateName: {{{DEPLOYMENT_NAME}}}-gpu-decode
      sharedMemory:
        size: 20Gi
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: SERVED_MODEL_NAME
              value: "{{{SERVED_MODEL_NAME}}}"
            - name: MODEL_PATH
              value: "{{{MODEL_LOCAL_PATH}}}"
{{#if ENABLE_MODEL_CACHE}}
            - name: HF_HOME
              value: /opt/models
{{/if}}
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.vllm
              --model $MODEL_PATH
              --served-model-name $SERVED_MODEL_NAME
              --tensor-parallel-size {{{DECODE_TP}}}
{{#if DECODE_ENABLE_PP}}
              --pipeline-parallel-size {{{DECODE_PP}}}
{{/if}}
              --is-decode-worker
              --connector nixl
{{#if ENABLE_EP}}
              --enable-expert-parallel
{{/if}}
{{#if ENABLE_KV_ROUTER}}
              --kv-events-config '{"enable_kv_cache_events": true}'
{{/if}}
              {{{ADDITIONAL_ARGS_INLINE}}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{#if IS_EKS}}
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
    
    # =========================================================================
    # VllmPrefillWorker: Disaggregated mode - DRA GPU allocation
    # =========================================================================
    VllmPrefillWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: prefill
      replicas: {{{PREFILL_REPLICAS}}}
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "64Gi"
        claims:
          - name: gpu
            resourceClaimTemplateName: {{{DEPLOYMENT_NAME}}}-gpu-prefill
      sharedMemory:
        size: 20Gi
{{#if ENABLE_MODEL_CACHE}}
      volumeMounts:
        - name: {{{MODEL_CACHE_PVC_NAME}}}
          mountPoint: /opt/models
{{/if}}
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:{{{IMAGE_TAG}}}
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: SERVED_MODEL_NAME
              value: "{{{SERVED_MODEL_NAME}}}"
            - name: MODEL_PATH
              value: "{{{MODEL_LOCAL_PATH}}}"
{{#if ENABLE_MODEL_CACHE}}
            - name: HF_HOME
              value: /opt/models
{{/if}}
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.vllm
              --model $MODEL_PATH
              --served-model-name $SERVED_MODEL_NAME
              --tensor-parallel-size {{{PREFILL_TP}}}
{{#if PREFILL_ENABLE_PP}}
              --pipeline-parallel-size {{{PREFILL_PP}}}
{{/if}}
              --is-prefill-worker
{{#if ENABLE_EP}}
              --enable-expert-parallel
{{/if}}
              {{{ADDITIONAL_ARGS_INLINE}}}
        nodeSelector:
          {{{GPU_NODE_SELECTOR_KEY}}}: "{{{GPU_NODE_SELECTOR_VALUE}}}"
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
{{#if IS_EKS}}
          - key: eks.amazonaws.com/compute-type
            operator: Equal
            value: auto
            effect: NoSchedule
{{/if}}
{{/if}}
{{#if ENABLE_INGRESS}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{{DEPLOYMENT_NAME}}}-frontend
spec:
  ingressClassName: "{{{INGRESS_CLASS}}}"
  rules:
    - http:
        paths:
          - path: {{{INGRESS_PATH}}}
            pathType: Prefix
            backend:
              service:
                name: {{{DEPLOYMENT_NAME}}}-frontend
                port:
                  number: 8000
{{/if}}
