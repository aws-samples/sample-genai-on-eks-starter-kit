# DynamoGraphDeploymentRequest — SLA-Driven Auto Deployment
# Generated by: ./cli nvidia-platform aiconfigurator install
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeploymentRequest
metadata:
  name: {{{DGDR_NAME}}}
  namespace: {{{NAMESPACE}}}
spec:
  model: "{{{MODEL}}}"
  backend: {{{BACKEND}}}

  profilingConfig:
    profilerImage: "nvcr.io/nvidia/ai-dynamo/{{#if IS_TRTLLM}}tensorrtllm{{else}}{{{BACKEND}}}{{/if}}-runtime:{{{IMAGE_TAG}}}"

    config:
      sweep:
        useAiConfigurator: {{{USE_AIC}}}
{{#if USE_AIC}}
        aicSystem: {{{AIC_SYSTEM}}}
{{#if AIC_BACKEND_VERSION}}
        aicBackendVersion: "{{{AIC_BACKEND_VERSION}}}"
{{/if}}
{{else}}
        prefillInterpolationGranularity: {{{PREFILL_GRANULARITY}}}
        decodeInterpolationGranularity: {{{DECODE_GRANULARITY}}}
{{/if}}
      sla:
        isl: {{{ISL}}}
        osl: {{{OSL}}}
        ttft: {{{TTFT}}}
        itl: {{{ITL}}}
{{#if MIN_GPUS}}
      hardware:
        minNumGpusPerEngine: {{{MIN_GPUS}}}
        maxNumGpusPerEngine: {{{MAX_GPUS}}}
{{/if}}
{{#if ENABLE_PLANNER}}
      planner:
        planner_min_endpoint: {{{PLANNER_MIN_ENDPOINT}}}
        planner_adjustment_interval: {{{PLANNER_ADJUSTMENT_INTERVAL}}}
{{/if}}

  deploymentOverrides:
    workersImage: "nvcr.io/nvidia/ai-dynamo/{{#if IS_TRTLLM}}tensorrtllm{{else}}{{{BACKEND}}}{{/if}}-runtime:{{{IMAGE_TAG}}}"

{{#if MODEL_CACHE_PVC}}
    modelCache:
      pvcName: "{{{MODEL_CACHE_PVC}}}"
{{#if MODEL_CACHE_PATH}}
      pvcPath: "{{{MODEL_CACHE_PATH}}}"
{{/if}}
{{/if}}

  autoApply: {{{AUTO_APPLY}}}
