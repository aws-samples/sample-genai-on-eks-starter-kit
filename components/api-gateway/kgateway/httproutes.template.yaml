# Keycloak (OIDC Provider)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: kgateway-system
spec:
  parentRefs:
  - name: main-gateway
  hostnames:
  - "keycloak.{{{DOMAIN}}}"
  rules:
  - backendRefs:
    - name: keycloak
      namespace: keycloak
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gloo-routes
  namespace: keycloak
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: kgateway-system
  to:
  - group: ""
    kind: Service
---
# OAuth2-Proxy routes (must be accessible without auth)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-proxy
  namespace: kgateway-system
spec:
  parentRefs:
  - name: main-gateway
  hostnames:
  - "auth.{{{DOMAIN}}}"
  rules:
  # OAuth2 endpoints (/oauth2/start, /oauth2/callback, /oauth2/sign_out, etc.)
  - matches:
    - path:
        type: PathPrefix
        value: /oauth2
    backendRefs:
    - name: oauth2-proxy
      namespace: oauth2-proxy
      port: 80
  # Root path: redirect to OpenWebUI (post-login landing)
  - matches:
    - path:
        type: Exact
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        hostname: openwebui.{{{DOMAIN}}}
        port: 443
        scheme: https
        statusCode: 302
  # Any other path falls through to oauth2-proxy
  - backendRefs:
    - name: oauth2-proxy
      namespace: oauth2-proxy
      port: 80
---
# OpenWebUI
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openwebui
  namespace: kgateway-system
spec:
  parentRefs:
  - name: main-gateway
  hostnames:
  - "openwebui.{{{DOMAIN}}}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /oauth2
    backendRefs:
    - name: oauth2-proxy
      namespace: oauth2-proxy
      port: 80
  - backendRefs:
    - name: openwebui
      namespace: openwebui
      port: 80
---
