# ReferenceGrants (allow gloo-system HTTPRoutes to reference services in other namespaces)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gloo-routes
  namespace: oauth2-proxy
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: kgateway-system
  to:
  - group: ""
    kind: Service
---
