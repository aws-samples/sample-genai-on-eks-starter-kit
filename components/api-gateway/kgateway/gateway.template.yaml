apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: kgateway-system
  annotations:
    networking.istio.io/service-type: LoadBalancer
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.{{{DOMAIN}}}"
    allowedRoutes:
      namespaces:
        from: All
