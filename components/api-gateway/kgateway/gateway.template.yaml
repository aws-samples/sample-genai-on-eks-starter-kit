apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: gloo-system
spec:
  gatewayClassName: gloo-gateway
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.{{{DOMAIN}}}"
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: wildcard-tls
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.{{{DOMAIN}}}"
    allowedRoutes:
      namespaces:
        from: All
