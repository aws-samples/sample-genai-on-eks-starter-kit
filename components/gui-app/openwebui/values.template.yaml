nameOverride: openwebui
{{#unless KGATEWAY_ENABLED}}
ingress:
  enabled: true
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
  {{#if DOMAIN}}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
  host: openwebui.{{{DOMAIN}}}
  {{else}}
  host:
  {{/if}}
{{else}}
ingress:
  enabled: false
{{/unless}}

# openaiBaseApiUrl: https://litellm.{{{DOMAIN}}}/v1
openaiBaseApiUrl: http://litellm.litellm:4000/v1
openaiApiKey: "{{{LITELLM_API_KEY}}}"

extraEnvVars:
  - name: ENABLE_OPENAI_API
    value: "true"
  - name: ENABLE_STREAMING_CHAT_COMPLETION
    value: "true"
  - name: WEBUI_ADMIN_EMAIL
    value: {{{OPENWEBUI_ADMIN_EMAIL}}}
  - name: WEBUI_ADMIN_PASSWORD
    value: {{{OPENWEBUI_ADMIN_PASSWORD}}}
  {{#if REDIS_URL}}
  - name: WEBUI_SESSION_COOKIE_SECURE
    value: "true"
  - name: WEBUI_SESSION_COOKIE_SAME_SITE
    value: "lax"
  {{/if}}
  {{#if OIDC_ACTIVE}}
  - name: WEBUI_AUTH_TRUSTED_EMAIL_HEADER
    value: "x-auth-request-email"
  - name: WEBUI_AUTH_TRUSTED_NAME_HEADER
    value: "x-auth-request-preferred-username"
  - name: WEBUI_AUTH_SIGNOUT_REDIRECT_URL
    value: "https://auth.{{{DOMAIN}}}/oauth2/sign_out?rd=https%3A%2F%2Fkeycloak.{{{DOMAIN}}}%2Frealms%2Fgenai%2Fprotocol%2Fopenid-connect%2Flogout%3Fclient_id%3D{{{OIDC_CLIENT_ID}}}%26post_logout_redirect_uri%3Dhttps%253A%252F%252Fopenwebui.{{{DOMAIN}}}%252F"
  # Forward user identity headers to upstream LLM APIs (LiteLLM)
  - name: ENABLE_FORWARD_USER_INFO_HEADERS
    value: "true"
  # Enable OIDC directly in OpenWebUI for group sync from Keycloak
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: ENABLE_OAUTH_GROUP_MANAGEMENT
    value: "true"
  - name: ENABLE_OAUTH_GROUP_CREATION
    value: "true"
  - name: OAUTH_CLIENT_ID
    value: "{{{OIDC_CLIENT_ID}}}"
  - name: OAUTH_CLIENT_SECRET
    value: "{{{OIDC_CLIENT_SECRET}}}"
  - name: OPENID_PROVIDER_URL
    value: "{{{OIDC_ISSUER_URL}}}/.well-known/openid-configuration"
  - name: OAUTH_PROVIDER_NAME
    value: "Keycloak"
  - name: OAUTH_SCOPES
    value: "openid email profile groups"
  - name: OAUTH_GROUPS_CLAIM
    value: "groups"
  {{else}}
  {{#if OIDC_CLIENT_ID}}
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: ENABLE_OAUTH_GROUP_MANAGEMENT
    value: "true"
  - name: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "true"
  - name: OAUTH_CLIENT_ID
    value: "{{{OIDC_CLIENT_ID}}}"
  - name: OAUTH_CLIENT_SECRET
    value: "{{{OIDC_CLIENT_SECRET}}}"
  - name: OPENID_PROVIDER_URL
    value: "{{{OIDC_ISSUER_URL}}}/.well-known/openid-configuration"
  - name: OAUTH_PROVIDER_NAME
    value: "AWS SSO"
  - name: OAUTH_SCOPES
    value: "openid email profile"
  - name: OAUTH_GROUPS_CLAIM
    value: "groups"
  - name: OAUTH_ADMIN_ROLES
    value: "admin"
  {{/if}}
  {{/if}}

ollama:
  enabled: false
pipelines:
  enabled: false

{{#if REDIS_URL}}
redis:
  enabled: false
redisUrl: "{{{REDIS_URL}}}"
{{/if}}

persistence:
  enabled: true
  storageClass: efs
  size: 100Gi

resources:
  requests:
    cpu: 1 
    memory: 2Gi
  limits:
    memory: 2Gi
