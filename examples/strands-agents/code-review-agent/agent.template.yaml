apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-review-agent
  namespace: strands-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-review-agent
  template:
    metadata:
      labels:
        app: code-review-agent
    spec:
      serviceAccountName: code-review-agent
      automountServiceAccountToken: false
      {{#unless useBuildx}}
      nodeSelector:
        kubernetes.io/arch: {{{arch}}}
      {{/unless}}
      containers:
        - name: agent
          image: {{{IMAGE}}}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          env:
            - name: USE_BEDROCK
              value: "{{{USE_BEDROCK}}}"
            {{#if USE_BEDROCK}}
            - name: BEDROCK_MODEL
              value: {{{BEDROCK_MODEL}}}
            {{else}}
            - name: LITELLM_BASE_URL
              value: {{{LITELLM_BASE_URL}}}
            - name: LITELLM_API_KEY
              value: {{{LITELLM_API_KEY}}}
            - name: LITELLM_MODEL_NAME
              value: {{{LITELLM_MODEL_NAME}}}
            {{/if}}
            - name: TEI_BASE_URL
              value: {{{TEI_BASE_URL}}}
            - name: QDRANT_URL
              value: {{{QDRANT_URL}}}
            - name: QDRANT_COLLECTION
              value: {{{QDRANT_COLLECTION}}}
            {{#if LANGFUSE_HOST}}
            - name: LANGFUSE_HOST
              value: {{{LANGFUSE_HOST}}}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{{LANGFUSE_PUBLIC_KEY}}}
            - name: LANGFUSE_SECRET_KEY
              value: {{{LANGFUSE_SECRET_KEY}}}
            {{/if}}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: code-review-agent
  namespace: strands-agents
spec:
  selector:
    app: code-review-agent
  ports:
    - name: http
      port: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-review-agent
  namespace: strands-agents
automountServiceAccountToken: false
